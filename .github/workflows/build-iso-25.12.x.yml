name: build 25.12.x ISO 

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择luci版本"
        required: false
        default: "25.12.0-rc2"
        type: choice
        options:
          - 25.12.0-rc1
          - 25.12.0-rc2
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '1024'
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置PPPoE拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false

permissions:
  contents: write

# 👇 全局强制启用 Node.js 24，消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_immortalwrt:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build25.sh
      
      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ github.event.inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ github.event.inputs.pppoe_account }}" || -z "${{ github.event.inputs.pppoe_password }}" ]]; then
              echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
              exit 1
            fi
          fi

      # 👇 增加调试步骤，打印关键变量和文件
      - name: Debug - Print key info
        run: |
          echo "GitHub Workspace: ${{ github.workspace }}"
          echo "Profile: ${{ github.event.inputs.profile }}"
          echo "LuCI Version: ${{ github.event.inputs.luci_version }}"
          echo "Docker image: immortalwrt/imagebuilder:x86-64-openwrt-${{ github.event.inputs.luci_version }}"
          ls -la ${{ github.workspace }}/x86-64/

      - name: ✅ 正在构建ImmortalWrt固件25.12.x
        run: |
          profile="${{ github.event.inputs.profile }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          luci_version="${{ github.event.inputs.luci_version }}"
          echo "Building for profile: $profile"
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/x86-64/imm25.config:/home/build/immortalwrt/.config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build25.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE="$profile" \
            -e INCLUDE_DOCKER="$include_docker" \
            -e ENABLE_PPPOE="${{ github.event.inputs.enable_pppoe }}" \
            -e PPPOE_ACCOUNT="${{ github.event.inputs.pppoe_account }}" \
            -e PPPOE_PASSWORD="${{ github.event.inputs.pppoe_password }}" \
          immortalwrt/imagebuilder:x86-64-openwrt-${luci_version} /bin/bash -x /home/build/immortalwrt/build.sh
        # 👇 -x 会打印所有命令执行过程，方便定位具体哪一步失败了

      - name: ✅ 复制固件到根目录
        run: |
          cp ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz ${{ github.workspace }} || echo "WARNING: No firmware image found!" && ls -la ${{ github.workspace }}/bin/targets/x86/64/

      - name: ✅ 上传固件到 artifact (for ISO generation)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-img
          path: |
            *.img.gz

  build_installer_iso:
    runs-on: ubuntu-22.04
    needs: build_immortalwrt
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-img

      - name: ⏬ 同步 img-installer 项目 准备制作ISO
        run: |
          git clone https://github.com/wukongdaily/img-installer.git
          cd img-installer

      - name: Set executable permissions for scripts
        run: |
          chmod +x "${{ github.workspace }}/img-installer/custom.sh"
          chmod +x "${{ github.workspace }}/img-installer/supportFiles/custom/build.sh"

      - name: ✅ 制作 25.12.x ISO
        run: |
          firmware_file=$(ls *squashfs-combined-efi.img.gz)
          echo "Found firmware: $firmware_file"
          cd img-installer
          bash -x autobuild/autobuild.sh "../$firmware_file"

      - name: 🚀 上传 ISO 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Custom-Installer-x86_64-ISO"
          body_path: "${{ github.workspace }}/img-installer/autobuild/info.md"
          files: |
            img-installer/output/custom-installer-x86_64.iso
          token: "${{ secrets.GITHUB_TOKEN }}"
